name: ISB_ecaformer_r39a_sigmoid_chscale
model_type: ImageISBModel
scale: 1
num_gpu: 1
manual_seed: 100

# R39a: R37d (res06, best PSNR) + channel_scale + sigmoid activation
# Switch output_activation to sigmoid (non-zero gradient at boundaries)
# Disable all clamps (redundant with sigmoid, prevents gradient blocking)
# channel_scale_init=[1.0, 0.95, 1.0] for green suppression

datasets:
  train:
    name: TrainSet
    type: Dataset_PairedImage
    dataroot_gt: data/LOLv1/Train/target
    dataroot_lq: data/LOLv1/Train/input
    geometric_augs: true
    filename_tmpl: '{}'
    io_backend:
      type: disk
    use_shuffle: true
    num_worker_per_gpu: 8
    dataset_enlarge_ratio: 1
    batch_size_per_gpu: 24
    mini_batch_sizes: [24]
    iters: [24000]
    gt_size: 128
    gt_sizes: [128]
    prefetch_mode: ~
  val:
    name: ValSet
    type: Dataset_PairedImage
    dataroot_gt: data/LOLv1/Test/target
    dataroot_lq: data/LOLv1/Test/input
    io_backend:
      type: disk

network_g:
  type: ECAFormerISB
  in_channels: 3
  out_channels: 3
  n_feat: 80
  level: 2
  num_blocks: [1, 2, 2]
  nfe: 8
  min_nfe_for_stability: 8
  sigma_max: 0.10
  use_checkpoint: true
  use_sb: true
  self_cond_prob: 0.0
  cond_type: adaln
  output_activation: sigmoid
  train_output_clamp: false
  inference_output_clamp: false
  reverse_noise_scale: 0.0
  use_out_norm: true
  mapping_bias: true
  pre_denoiser_x1_clamp: false
  residual_scale_init: 0.6
  channel_scale_init: [1.0, 0.95, 1.0]
  illumination_channels: 1
  use_eca: true
  eca_gamma: 1.5
  eca_beta: 1

path:
  pretrain_network_g: ~
  strict_load_g: true
  resume_state: ~

train:
  total_iter: 24000
  warmup_iter: 500
  use_grad_clip: true
  grad_clip_value: 0.02
  use_amp: true
  accumulate_steps: 1
  ema_decay: 0.999
  bridge_weight: 1.0
  x0_loss_weight: 0.4
  pixel_loss_weight: 0.6
  tv_loss_weight: 0.002
  color_loss_weight: 0.1
  strict_output_range: true
  loss_on_clamped_output: false
  nan_guard: true
  output_range_log_interval: 500
  train_psnr_window: 512
  psnr_gap_warn: 2.0
  early_stop_patience_val: 8
  early_stop_min_delta: 0.005
  max_nan_skips_per_epoch: 3
  scheduler:
    type: CosineAnnealingRestartLR
    periods: [24000]
    restart_weights: [1]
    eta_min: !!float 1e-6
  mixing_augs:
    mixup: true
    mixup_beta: 1.2
    use_identity: true
  optim_g:
    type: AdamW
    lr: !!float 6e-5
    betas: [0.9, 0.999]
    weight_decay: !!float 0.05
  pixel_opt:
    type: CharbonnierLoss
    loss_weight: 1.0
    reduction: mean
    eps: !!float 1e-3
  perceptual_opt:
    type: VGGPerceptualLoss
    loss_weight: 0.1

val:
  window_size: 4
  val_freq: !!float 500
  save_img: true
  rgb2bgr: true
  use_image: false
  max_minibatch: 8
  metrics:
    psnr:
      type: calculate_psnr
      crop_border: 0
      test_y_channel: false
    ssim:
      type: calculate_ssim
      crop_border: 0
      test_y_channel: false
    lpips:
      type: calculate_lpips
      crop_border: 0
      test_y_channel: false
      net: alex
      use_gpu: true

logger:
  print_freq: 200
  save_checkpoint_freq: !!float 500
  use_tb_logger: true
  wandb:
    project: low_light_isb
    resume_id: ~
dist_params:
  backend: nccl
  port: 29500
