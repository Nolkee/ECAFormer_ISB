name: ISB_ecaformer_full_s19_adamw_wd1e4_lr5e5
model_type: ImageISBModel
scale: 1
num_gpu: 1
manual_seed: 100

# S19 full ablation C: AdamW + weight_decay=1e-4 + lr=5e-5

datasets:
  train:
    name: TrainSet
    type: Dataset_PairedImage
    dataroot_gt: data/LOLv1/Train/target
    dataroot_lq: data/LOLv1/Train/input
    geometric_augs: true
    filename_tmpl: '{}'
    io_backend:
      type: disk
    use_shuffle: true
    num_worker_per_gpu: 8
    dataset_enlarge_ratio: 1
    batch_size_per_gpu: 24
    mini_batch_sizes: [24]
    iters: [16667]
    gt_size: 128
    gt_sizes: [128]
    prefetch_mode: ~
  val:
    name: ValSet
    type: Dataset_PairedImage
    dataroot_gt: data/LOLv1/Test/target
    dataroot_lq: data/LOLv1/Test/input
    io_backend:
      type: disk

network_g:
  type: ECAFormerISB
  in_channels: 3
  out_channels: 3
  n_feat: 40
  level: 2
  num_blocks: [1, 2, 2]
  nfe: 4
  min_nfe_for_stability: 4
  sigma_max: 0.10
  use_checkpoint: true
  use_sb: true
  self_cond_prob: 0.0
  cond_type: adaln

path:
  pretrain_network_g: ~
  strict_load_g: true
  resume_state: ~

train:
  total_iter: 16667
  warmup_iter: -1
  use_grad_clip: true
  grad_clip_value: 1.0
  use_amp: true
  accumulate_steps: 1
  ema_decay: 0.999
  x0_loss_weight: 0.5
  pixel_loss_weight: 0.5
  tv_loss_weight: 0.01
  strict_output_range: true
  nan_guard: true
  output_range_log_interval: 200
  train_psnr_window: 512
  psnr_gap_warn: 2.0
  early_stop_patience_val: 4
  early_stop_min_delta: 0.01
  max_nan_skips_per_epoch: 5
  scheduler:
    type: CosineAnnealingRestartLR
    periods: [16667]
    restart_weights: [1]
    eta_min: !!float 1e-6
  mixing_augs:
    mixup: true
    mixup_beta: 1.2
    use_identity: true
  optim_g:
    type: AdamW
    lr: !!float 5e-5
    betas: [0.9, 0.999]
    weight_decay: !!float 1e-4
  pixel_opt:
    type: L1Loss
    loss_weight: 1
    reduction: mean

val:
  window_size: 4
  val_freq: !!float 500
  save_img: true
  rgb2bgr: true
  use_image: false
  max_minibatch: 8
  metrics:
    psnr:
      type: calculate_psnr
      crop_border: 0
      test_y_channel: false
    ssim:
      type: calculate_ssim
      crop_border: 0
      test_y_channel: false
    lpips:
      type: calculate_lpips
      crop_border: 0
      test_y_channel: false
      net: alex
      use_gpu: true

logger:
  print_freq: 50
  save_checkpoint_freq: !!float 1000
  use_tb_logger: true
  wandb:
    project: low_light_isb
    resume_id: ~
dist_params:
  backend: nccl
  port: 29500
