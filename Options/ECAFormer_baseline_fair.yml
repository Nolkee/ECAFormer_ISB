name: ECAFormer_baseline_fair
model_type: ImageCleanModel
scale: 1
num_gpu: 1
manual_seed: 100

# Baseline 公平对比配置
# optimizer step = 16667 (与 ISB 的 50000 iter / accumulate 3 对齐)

datasets:
  train:
    name: TrainSet
    type: Dataset_PairedImage
    dataroot_gt: data/LOLv1/Train/target
    dataroot_lq: data/LOLv1/Train/input
    geometric_augs: true
    filename_tmpl: '{}'
    io_backend:
      type: disk
    use_shuffle: true
    num_worker_per_gpu: 8
    batch_size_per_gpu: 24
    mini_batch_sizes: [24]
    iters: [16667]
    gt_size: 128
    gt_sizes: [128]
    dataset_enlarge_ratio: 1
    prefetch_mode: ~
  val:
    name: ValSet
    type: Dataset_PairedImage
    dataroot_gt: data/LOLv1/Test/target
    dataroot_lq: data/LOLv1/Test/input
    io_backend:
      type: disk

network_g:
  type: ECAFormerBaseline
  in_channels: 3
  out_channels: 3
  n_feat: 40
  level: 2
  num_blocks: [1, 2, 2]
  stage: 1

path:
  pretrain_network_g: ~
  strict_load_g: true
  resume_state: ~

train:
  total_iter: 16667
  warmup_iter: -1
  use_grad_clip: true
  use_amp: true
  # accumulate_steps: 不适用于 ImageCleanModel
  ema_decay: 0.999
  scheduler:
    type: CosineAnnealingRestartLR
    periods: [16667]
    restart_weights: [1]
    eta_min: !!float 1e-6
  mixing_augs:
    mixup: true
    mixup_beta: 1.2
    use_identity: true
  optim_g:
    type: Adam
    lr: !!float 2e-4
    betas: [0.9, 0.999]
  pixel_opt:
    type: L1Loss
    loss_weight: 1
    reduction: mean

val:
  window_size: 4
  val_freq: !!float 2500
  save_img: true
  rgb2bgr: true
  use_image: false
  max_minibatch: 8
  metrics:
    psnr:
      type: calculate_psnr
      crop_border: 0
      test_y_channel: false
    ssim:
      type: calculate_ssim
      crop_border: 0
      test_y_channel: false
    lpips:
      type: calculate_lpips
      crop_border: 0
      test_y_channel: false
      net: alex
      use_gpu: true

logger:
  print_freq: 200
  save_checkpoint_freq: !!float 5000
  use_tb_logger: true
  wandb:
    project: low_light_isb
    resume_id: ~
dist_params:
  backend: nccl
  port: 29500
