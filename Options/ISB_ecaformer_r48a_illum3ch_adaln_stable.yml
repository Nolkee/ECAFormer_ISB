name: ISB_ecaformer_r48a_illum3ch_adaln_stable
model_type: ImageISBModel
scale: 1
num_gpu: 1
manual_seed: 100

# R48a: 3ch illumination + AdaLN stabilization
#
# ROOT CAUSE OF R47 CRASH (from agent analysis):
# - AdaLN zero-init (proj.weight=0) creates brittle learned corrections
# - When x1 distribution shifts, AdaLN explodes at 6K-8K
#
# FIXES:
# 1. adaln_init_scale: 0.1 (non-zero init, more robust)
# 2. Extended warmup: 2000 iters (let AdaLN adapt gradually)
# 3. Stronger color_loss: 0.3 (vs 0.1, reduce green bias from start)
# 4. Lower initial LR: 4e-5 → 6e-5 (smoother early training)
#
# HYPOTHESIS: R47a's 20.89 @ 5.5K was on right track, just needed stability.
# Expected: PSNR 22.2+, stable through 24K, natural colors.

datasets:
  train:
    name: TrainSet
    type: Dataset_PairedImage
    dataroot_gt: data/LOLv1/Train/target
    dataroot_lq: data/LOLv1/Train/input
    geometric_augs: true
    filename_tmpl: '{}'
    io_backend:
      type: disk
    use_shuffle: true
    num_worker_per_gpu: 8
    dataset_enlarge_ratio: 1
    batch_size_per_gpu: 24
    mini_batch_sizes: [24]
    iters: [24000]
    gt_size: 128
    gt_sizes: [128]
    prefetch_mode: ~
  val:
    name: ValSet
    type: Dataset_PairedImage
    dataroot_gt: data/LOLv1/Test/target
    dataroot_lq: data/LOLv1/Test/input
    io_backend:
      type: disk

network_g:
  type: ECAFormerISB
  in_channels: 3
  out_channels: 3
  n_feat: 80
  level: 2
  num_blocks: [1, 2, 2]
  nfe: 8
  min_nfe_for_stability: 8
  sigma_max: 0.10
  use_checkpoint: true
  use_sb: true
  self_cond_prob: 0.0
  cond_type: adaln
  output_activation: identity
  train_output_clamp: true
  inference_output_clamp: true
  reverse_noise_scale: 0.0
  use_out_norm: true
  mapping_bias: true
  pre_denoiser_x1_clamp: false
  residual_scale_init: 0.6
  channel_scale_init: [1.0, 1.0, 1.0]
  illumination_channels: 3  # Per-channel illumination (original ECAFormer)
  use_eca: true
  eca_gamma: 1.5
  eca_beta: 1
  adaln_init_scale: 0.1  # Non-zero init for stability (vs default 0.0)

path:
  pretrain_network_g: ~
  strict_load_g: true
  resume_state: ~

train:
  total_iter: 24000
  warmup_iter: 2000  # Extended warmup (vs 500) for AdaLN adaptation
  use_grad_clip: true
  grad_clip_value: 0.02
  use_amp: true
  accumulate_steps: 1
  ema_decay: 0.999
  bridge_weight: 1.0
  x0_loss_weight: 0.4
  pixel_loss_weight: 0.6
  tv_loss_weight: 0.002
  color_loss_weight: 0.3  # Stronger (vs 0.1) to suppress early green bias
  chroma_loss_weight: 0.05
  strict_output_range: true
  loss_on_clamped_output: true
  nan_guard: true
  output_range_log_interval: 500
  train_psnr_window: 512
  psnr_gap_warn: 2.0
  early_stop_patience_val: 8
  early_stop_min_delta: 0.005
  max_nan_skips_per_epoch: 3
  scheduler:
    type: CosineAnnealingRestartLR
    periods: [24000]
    restart_weights: [1]
    eta_min: !!float 1e-6
  mixing_augs:
    mixup: true
    mixup_beta: 1.2
    use_identity: true
  optim_g:
    type: AdamW
    lr: !!float 4e-5  # Lower initial LR (vs 6e-5) for smoother warmup
    betas: [0.9, 0.999]
    weight_decay: !!float 0.05
  pixel_opt:
    type: CharbonnierLoss
    loss_weight: 1.0
    reduction: mean
    eps: !!float 1e-3
  perceptual_opt:
    type: VGGPerceptualLoss
    loss_weight: 0.1

val:
  window_size: 4
  val_freq: !!float 500
  save_img: true
  rgb2bgr: true
  use_image: false
  max_minibatch: 8
  metrics:
    psnr:
      type: calculate_psnr
      crop_border: 0
      test_y_channel: false
    ssim:
      type: calculate_ssim
      crop_border: 0
      test_y_channel: false
    lpips:
      type: calculate_lpips
      crop_border: 0
      test_y_channel: false
      net: alex
      use_gpu: true

logger:
  print_freq: 200
  save_checkpoint_freq: !!float 500
  use_tb_logger: true
  wandb:
    project: low_light_isb
    resume_id: ~
dist_params:
  backend: nccl
  port: 29500
