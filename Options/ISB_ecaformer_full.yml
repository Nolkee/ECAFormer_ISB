name: ISB_ecaformer_full
model_type: ImageISBModel
scale: 1
num_gpu: 1
manual_seed: 100

# Phase 2: 完整训练 — 用筛选出的最佳参数
# TODO: 根据 Phase 1 结果替换下面标注 [TUNABLE] 的参数

datasets:
  train:
    name: TrainSet
    type: Dataset_PairedImage
    dataroot_gt: data/LOLv1/Train/target
    dataroot_lq: data/LOLv1/Train/input
    geometric_augs: true
    filename_tmpl: '{}'
    io_backend:
      type: disk
    use_shuffle: true
    num_worker_per_gpu: 8
    dataset_enlarge_ratio: 1
    batch_size_per_gpu: 24
    mini_batch_sizes: [24]
    iters: [16667]
    gt_size: 128
    gt_sizes: [128]
    prefetch_mode: ~
  val:
    name: ValSet
    type: Dataset_PairedImage
    dataroot_gt: data/LOLv1/Test/target
    dataroot_lq: data/LOLv1/Test/input
    io_backend:
      type: disk

network_g:
  type: ECAFormerISB
  in_channels: 3
  out_channels: 3
  n_feat: 40
  level: 2
  num_blocks: [1, 2, 2]
  nfe: 8
  sigma_max: 0.15
  use_checkpoint: true
  use_sb: true
  self_cond_prob: 0.0          # S5 筛选结果: 关闭 self-cond 效果最佳
  cond_type: adaln

path:
  pretrain_network_g: ~
  strict_load_g: true
  resume_state: ~

train:
  total_iter: 16667
  warmup_iter: -1
  use_grad_clip: true
  grad_clip_value: 1.0
  use_amp: true
  accumulate_steps: 1          # batch=24 直接跑，无需梯度累积
  ema_decay: 0.999
  x0_loss_weight: 0.5
  pixel_loss_weight: 0.5
  tv_loss_weight: 0.01
  scheduler:
    type: CosineAnnealingRestartLR
    periods: [16667]
    restart_weights: [1]
    eta_min: !!float 1e-6
  mixing_augs:
    mixup: true
    mixup_beta: 1.2
    use_identity: true
  optim_g:
    type: Adam
    lr: !!float 1e-4            # S2 筛选结果: 低 lr 更稳定
    betas: [0.9, 0.999]
  pixel_opt:
    type: L1Loss
    loss_weight: 1
    reduction: mean

val:
  window_size: 4
  val_freq: !!float 2500
  save_img: true
  rgb2bgr: true
  use_image: false
  max_minibatch: 8
  metrics:
    psnr:
      type: calculate_psnr
      crop_border: 0
      test_y_channel: false
    ssim:
      type: calculate_ssim
      crop_border: 0
      test_y_channel: false
    lpips:
      type: calculate_lpips
      crop_border: 0
      test_y_channel: false
      net: alex
      use_gpu: true

logger:
  print_freq: 200
  save_checkpoint_freq: !!float 5000
  use_tb_logger: true
  wandb:
    project: low_light_isb
    resume_id: ~
dist_params:
  backend: nccl
  port: 29500
