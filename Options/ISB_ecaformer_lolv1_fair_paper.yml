name: ISB_ecaformer_lolv1_fair_paper
model_type: ImageISBModel
scale: 1
num_gpu: 1
manual_seed: 100

# Fair ISB protocol: LOLv1 only, same data/metrics/optimizer/schedule as pure ECAFormer.
# Keep only ISB / bridge training mechanics as the model-side difference.

datasets:
  train:
    name: TrainSet
    type: Dataset_PairedImage
    dataroot_gt: data/LOLv1/Train/target
    dataroot_lq: data/LOLv1/Train/input
    geometric_augs: true
    filename_tmpl: '{}'
    io_backend:
      type: disk
    use_shuffle: true
    num_worker_per_gpu: 8
    dataset_enlarge_ratio: 1
    batch_size_per_gpu: 8
    mini_batch_sizes: [8]
    iters: [250000]
    gt_size: 256
    gt_sizes: [256]
    prefetch_mode: ~
  val:
    name: ValSet
    type: Dataset_PairedImage
    dataroot_gt: data/LOLv1/Test/target
    dataroot_lq: data/LOLv1/Test/input
    io_backend:
      type: disk

network_g:
  type: ECAFormerISB
  in_channels: 3
  out_channels: 3
  n_feat: 40
  level: 2
  num_blocks: [1, 2, 2]
  nfe: 4
  min_nfe_for_stability: 4
  sigma_max: 0.10
  use_checkpoint: true
  use_sb: true
  self_cond_prob: 0.0
  cond_type: adaln
  output_activation: identity
  train_output_clamp: false
  inference_output_clamp: true
  reverse_noise_scale: 0.0
  use_out_norm: true
  mapping_bias: true

path:
  pretrain_network_g: ~
  strict_load_g: true
  resume_state: ~

train:
  total_iter: 250000
  warmup_iter: 5000
  use_grad_clip: true
  grad_clip_value: 0.02
  use_amp: true
  accumulate_steps: 1
  ema_decay: 0.999
  x0_loss_weight: 1.0
  x0_loss_type: charbonnier
  x0_charbonnier_eps: 1e-3
  pixel_loss_weight: 0.0
  tv_loss_weight: 0.0
  color_loss_weight: 0.0
  strict_output_range: true
  loss_on_clamped_output: false
  nan_guard: true
  output_range_log_interval: 100
  train_psnr_window: 512
  psnr_gap_warn: 2.0
  early_stop_patience_val: 6
  early_stop_min_delta: 0.005
  max_nan_skips_per_epoch: 3
  scheduler:
    type: CosineAnnealingRestartLR
    periods: [250000]
    restart_weights: [1]
    eta_min: !!float 1e-6
  mixing_augs:
    mixup: false
    mixup_beta: 1.2
    use_identity: true
  optim_g:
    type: Adam
    lr: !!float 2e-4
    betas: [0.9, 0.999]
  pixel_opt:
    type: CharbonnierLoss
    loss_weight: 1.0
    reduction: mean
    eps: 1e-3
  perceptual_opt:
    type: VGGPerceptualLoss
    loss_weight: 0.1

val:
  window_size: 4
  val_freq: !!float 5000
  save_img: true
  rgb2bgr: true
  use_image: false
  max_minibatch: 8
  metrics:
    psnr:
      type: calculate_psnr
      crop_border: 0
      test_y_channel: false
    ssim:
      type: calculate_ssim
      crop_border: 0
      test_y_channel: false
    lpips:
      type: calculate_lpips
      crop_border: 0
      test_y_channel: false
      net: alex
      use_gpu: true

logger:
  print_freq: 50
  save_checkpoint_freq: !!float 5000
  use_tb_logger: true
  wandb:
    project: low_light_isb
    resume_id: ~

dist_params:
  backend: nccl
  port: 29500
